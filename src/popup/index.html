<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Spoiler Shield</title>
  <link rel="stylesheet" href="./popup.css">
</head>
<body>
  <header>
    <h1>🛡️ Spoiler Shield</h1>
    <div class="header-actions">
      <button id="settings-btn" class="icon-btn" aria-label="Settings" title="Settings">⚙️</button>
      <label class="toggle">
        <input type="checkbox" id="enabled-toggle">
        <span>Enabled</span>
      </label>
    </div>
  </header>
  
  <section class="current-page">
    <label class="toggle small">
      <input type="checkbox" id="site-toggle">
      <span>Disable on <span id="current-hostname">this site</span></span>
    </label>
    <button id="snooze-btn" class="snooze-btn">Snooze 30 min</button>
  </section>

  <section id="settings-panel" hidden>
    <label class="field">
      <span>Gemini API key <span id="key-status-badge" class="badge"></span></span>
      <input type="password" id="api-key-input" placeholder="Paste your key" autocomplete="off">
    </label>
    <p class="help">
      <a href="https://aistudio.google.com/" target="_blank" rel="noreferrer">Get a free key →</a>
      Stored locally, never synced. Free tier prompts may be used by Google for training.
    </p>
    <div class="settings-actions">
      <button id="save-key-btn">Save</button>
      <button id="remove-key-btn" class="secondary">Remove</button>
      <span id="key-status" class="status"></span>
    </div>  
  </section>

  <section>
    <form id="add-form">
      <input
        type="text"
        id="keyword-input"
        placeholder="Add a keyword (e.g., Succession)"
        autocomplete="off"
        required
      >
      <button type="submit">Add</button>
    </form>

    <ul id="keyword-list"></ul>
    <p id="empty-state" hidden>No keywords yet. Add one above.</p>
  </section>

  <script type="module" src="./popup.ts"></script>
</body>
</html>
